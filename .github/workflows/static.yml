# 静态网页部署配置（适配 Quarto）
name: Deploy Quarto Site

on:
  # 每当代码推送到 main 分支时触发
  push:
    branches: [ main ]

  # 允许手动从 Actions 页面运行
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 配置 Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: 安装 Jekyll（兼容 Quarto）
        run: gem install jekyll
      - name: 复制 Quarto 输出到站点目录
        run: cp -r _site/* .
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5
      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传 _site 目录
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
